{% extends "components/base.html" %}

{% block title %}Add Company{% endblock %}

{% block content %}

<div class="container py-5">

<div class="card shadow p-4">

<h2>Add Company</h2>

<form method="POST">

<div class="mb-3">

<label>Company Name</label>

<input type="text"
class="form-control"
name="company_name"
required>

</div>

<div class="mb-3">

<label>Location</label>

<input type="text"
class="form-control"
name="location"
required>

</div>

<button class="btn btn-success">

Add Company

</button>

</form>

</div>

</div>

{% endblock %}
