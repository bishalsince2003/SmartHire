{% extends "components/base.html" %}

{% block title %}Company Login{% endblock %}

{% block content %}

<div class="container py-5">

<div class="row justify-content-center">

<div class="col-lg-5">

<div class="card shadow">

<div class="card-body p-4">

<h2 class="text-center mb-4">

Company Login

</h2>

<form method="POST">

<div class="mb-3">

<label>Email</label>

<input
type="email"
name="email"
class="form-control"
required>

</div>

<div class="mb-3">

<label>Password</label>

<input
type="password"
name="password"
class="form-control"
required>

</div>

<button
class="btn btn-primary w-100">

Login

</button>

</form>

<hr>

<div class="text-center">

New Company?

<a href="/company-register">

Register Here

</a>

</div>

</div>

</div>

</div>

</div>

</div>

{% endblock %}
