{% extends "components/base.html" %}

{% block title %}Company Register{% endblock %}

{% block content %}

<div class="container py-5">

<div class="row justify-content-center">

<div class="col-lg-6">

<div class="card shadow">

<div class="card-body p-4">

<h2 class="text-center mb-4">

Company Registration

</h2>

<form method="POST">

<div class="mb-3">

<label class="form-label">Company Name</label>

<input
type="text"
name="company_name"
class="form-control"
required>

</div>

<div class="mb-3">

<label class="form-label">Email</label>

<input
type="email"
name="email"
class="form-control"
required>

</div>

<div class="mb-3">

<label class="form-label">Password</label>

<input
type="password"
name="password"
class="form-control"
required>

</div>

<div class="mb-3">

<label class="form-label">Website</label>

<input
type="text"
name="website"
class="form-control">

</div>

<div class="mb-3">

<label class="form-label">Location</label>

<input
type="text"
name="location"
class="form-control">

</div>

<div class="mb-3">

<label class="form-label">Description</label>

<textarea
name="description"
class="form-control"
rows="4"></textarea>

</div>

<button
class="btn btn-primary w-100">

Register Company

</button>

</form>

<hr>

<div class="text-center">

Already registered?

<a href="/company-login">

Login

</a>

</div>

</div>

</div>

</div>

</div>

</div>

{% endblock %}
