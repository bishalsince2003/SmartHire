{% extends "components/base.html" %}

{% block title %}Contact{% endblock %}

{% block content %}

<div class="container py-5">

<div class="row justify-content-center">

<div class="col-lg-8">

<div class="card shadow">

<div class="card-body p-4">

<h2 class="mb-4 text-center">

Contact Us

</h2>

{% if success %}

<div class="alert alert-success">

Your message has been sent successfully.

</div>

{% endif %}

<form method="POST">

<div class="mb-3">

<label>Name</label>

<input
type="text"
name="name"
class="form-control"
required>

</div>

<div class="mb-3">

<label>Email</label>

<input
type="email"
name="email"
class="form-control"
required>

</div>

<div class="mb-3">

<label>Subject</label>

<input
type="text"
name="subject"
class="form-control"
required>

</div>

<div class="mb-3">

<label>Message</label>

<textarea
name="message"
rows="5"
class="form-control"
required></textarea>

</div>

<button
class="btn btn-primary w-100">

Send Message

</button>

</form>

</div>

</div>

</div>

</div>

</div>

{% endblock %}
