{% extends "components/base.html" %}

{% block title %}Edit Profile{% endblock %}

{% block content %}

<div class="container py-5">

<div class="card shadow p-4">

<h2>Edit Profile</h2>

<form method="POST" enctype="multipart/form-data">

<div class="mb-3">
<label>Name</label>
<input type="text" class="form-control"
name="full_name"
value="{{ user.full_name }}">
</div>

<div class="mb-3">
<label>Phone</label>
<input type="text" class="form-control"
name="phone"
value="{{ user.phone }}">
</div>

<div class="mb-3">

<label>Resume</label>

<input
type="file"
class="form-control"
name="resume">

</div>

<button class="btn btn-primary">
Update Profile
</button>

</form>

</div>

</div>

{% endblock %}
